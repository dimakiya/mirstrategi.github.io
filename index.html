<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Иберийская Стратегия — iberstrategi.net</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <header class="game-header">
      <h1>Иберийская Стратегия</h1>
      <p>Официальный сайт: <a href="https://github.com/dimakiya" target="_blank">iberstrategi.net</a></p>
    </header>

    <div id="main-content">
      <canvas id="game-canvas" width="1000" height="600"></canvas>

      <div id="ui-panels">
        <div id="country-panel" class="panel">
          <h3>Ваша страна</h3>
          <div id="country-info"></div>
          <button onclick="ui.showCountrySettings()">Настройки страны</button>
        </div>

        <div id="economy-panel" class="panel">
          <h3>Экономика</h3>
          <p>Деньги: <span id="money">0</span></p>
          <p>Население: <span id="population">0</span></p>
          <button onclick="game.collectTaxes()">Собрать налоги</button>
        </div>

        <div id="army-panel" class="panel">
          <h3>Армия</h3>
          <p>Войска: <span id="army">0</span></p>
          <button onclick="game.trainArmy()">Обучить войска</button>
        </div>

        <div id="diplomacy-panel" class="panel">
          <h3>Дипломатия</h3>
          <button onclick="ui.declareWar()">Объявить войну</button>
          <button onclick="ui.formAlliance()">Заключить союз</button>
        </div>

        <div id="rebellion-panel" class="panel">
          <h3>Восстание</h3>
          <p>Можно поднять восстание в любом регионе</p>
          <button onclick="events.startRebellion()">Поднять восстание</button>
        </div>
      </div>
    </div>

    <footer class="game-footer">
      <p>&copy; 2026 iberstrategi.net. Все права защищены.</p>
    </footer>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/map.js"></script>
  <script src="js/game.js"></script>
  <script src="js/events.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
